# NYU Depth v2 dataset configuration
# NYU Depth v2 数据集配置

dataset:
  name: NYUDepthv2
  num_classes: 40
  ignore_index: 255
  data_root: datasets/NYUDepthv2

  # File paths
  rgb_dir: RGB
  depth_dir: Depth
  label_dir: Label
  rgb_format: .jpg
  depth_format: .png
  label_format: .png
  train_split: train.txt
  val_split: test.txt

  # Dataset size (for niters_per_epoch calculation)
  num_train: 795
  num_val: 654

  # Input dimensions
  image_height: 480
  image_width: 640

  # Normalization
  rgb_mean: [0.485, 0.456, 0.406]
  rgb_std: [0.229, 0.224, 0.225]
  depth_mean: [0.48, 0.48, 0.48]
  depth_std: [0.28, 0.28, 0.28]

  # Ground truth: 1-indexed in PNG, subtract 1 at load time
  gt_remap: true

  # Text prior files (relative to data_root)
  label_txt: nyu40_labels.txt
  image_labels_json: image_labels.json

  # Vocabulary embedding cache (relative to data_root)
  vocab_embeds: cache/vocab_embeds.pt
