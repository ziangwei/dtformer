# DTFormer-S model configuration
# DTFormer-S 模型配置

model:
  backbone: DTFormer_S
  pretrained: checkpoints/pretrained/DTFormer_Small_pretrained.pth
  num_classes: 40

  # Backbone architecture
  embed_dims: [64, 128, 256, 512]
  depths: [3, 4, 18, 4]
  num_heads: [4, 4, 8, 16]
  drop_path_rate: 0.25

  # Text guidance
  text_dim: 512
  text_encoder: clip             # Only CLIP (via open_clip) is supported
  text_encoder_name: null        # null -> ViT-B-16 openai
  text_template_set: clip
  max_templates_per_label: 3

  # TSA-E: encoder-side text alignment (stages 2-4, 0-indexed: 1,2,3)
  tsae_stages: [1, 2, 3]

  # TSA-D: decoder-side text alignment (all 3 decoder levels)
  tsad_stages: [1, 2, 3]
  tsad_use_topk: false           # disabled for image_specific mode
  tsad_top_m: 5

  # Decoder (HSG)
  decoder: HSGHead
  decoder_embed_dim: 512
  decoder_in_index: [1, 2, 3]   # backbone stages feeding the decoder

  # Auxiliary head
  aux_rate: 0.0                  # 0 = disabled; set to 0.4 to enable
