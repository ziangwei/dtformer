# Experiment: SUNRGBD + DTFormer-B + image_specific + CLIP
# 实验配置：SUNRGBD + DTFormer-B

# Inherit dataset and model configs
dataset_config: configs/datasets/sunrgbd.yaml
model_config: configs/models/dtformer_b.yaml

# Model overrides (SUNRGBD uses lower drop_path than NYU)
model:
  drop_path_rate: 0.2

# Text mode
text:
  mode: image_specific         # "fixed" or "image_specific"
  max_image_labels: 6          # Top-K labels per image

# Training
train:
  optimizer: AdamW
  lr: 6.0e-5
  lr_power: 0.9
  weight_decay: 0.01
  batch_size: 16
  epochs: 300
  warmup_epochs: 10
  num_workers: 2
  scale_array: [0.5, 0.75, 1.0, 1.25, 1.5, 1.75]

  # BN settings
  bn_eps: 1.0e-3
  bn_momentum: 0.1

  # Auxiliary loss weight (0 = off)
  aux_rate: 0.0

# Evaluation
eval:
  scale_array: [0.5, 0.75, 1.0, 1.25, 1.5]
  flip: true
  crop_size: [480, 480]        # SUNRGBD: square
  stride_rate: 0.667

# Checkpointing
checkpoint:
  save_start_epoch: 180
  save_interval: 25
  log_dir: checkpoints/SUNRGBD_DTFormer_B
